<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まとみる — 歌詞をまとめてみるノート</title>
<style>
  /* ===== Theme tokens ===== */
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
    --font-serif: "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --transition: 0.25s ease;
  }

  /* Light mode — wood */
  body.light {
    --bg-page: #f4ede0;
    --bg-page-image:
      repeating-linear-gradient(90deg,
        rgba(120, 80, 40, 0.025) 0px,
        rgba(120, 80, 40, 0.025) 1px,
        transparent 1px,
        transparent 3px),
      repeating-linear-gradient(180deg,
        rgba(120, 80, 40, 0.04) 0px,
        rgba(120, 80, 40, 0.04) 1px,
        transparent 1px,
        transparent 80px),
      radial-gradient(ellipse 800px 400px at 20% 30%, rgba(160, 110, 60, 0.08), transparent),
      radial-gradient(ellipse 600px 300px at 80% 70%, rgba(140, 90, 50, 0.06), transparent);
    --bg-surface: #faf6ec;
    --bg-surface-2: #efe6d3;
    --bg-elevated: #fffdf7;
    --text-primary: #2a1f15;
    --text-secondary: #6b5942;
    --text-tertiary: #9a8a73;
    --border: rgba(80, 50, 20, 0.15);
    --border-strong: rgba(80, 50, 20, 0.3);
    --accent: #8b5a2b;
    --accent-soft: #d9c5a3;
    --highlight-bg: #e8d4a8;
    --highlight-text: #4a2f10;
    --highlight-border: #b8893d;
    --highlight-active: #d4a85c;
    --shadow-sm: 0 1px 3px rgba(80, 50, 20, 0.08);
    --shadow-md: 0 4px 16px rgba(80, 50, 20, 0.12);
    --shadow-lg: 0 8px 32px rgba(80, 50, 20, 0.18);
  }

  /* Dark mode — iron */
  body.dark {
    --bg-page: #1a1c1e;
    --bg-page-image:
      repeating-linear-gradient(135deg,
        rgba(255, 255, 255, 0.012) 0px,
        rgba(255, 255, 255, 0.012) 1px,
        transparent 1px,
        transparent 4px),
      repeating-linear-gradient(45deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 6px),
      radial-gradient(ellipse 900px 500px at 30% 20%, rgba(80, 90, 100, 0.12), transparent),
      radial-gradient(ellipse 700px 400px at 70% 80%, rgba(60, 70, 80, 0.1), transparent);
    --bg-surface: #232629;
    --bg-surface-2: #2c2f33;
    --bg-elevated: #2a2d31;
    --text-primary: #e8e8e8;
    --text-secondary: #9ca0a4;
    --text-tertiary: #6b6f73;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.18);
    --accent: #c8c8cc;
    --accent-soft: #3a3d41;
    --highlight-bg: #3d4148;
    --highlight-text: #e8d4a8;
    --highlight-border: #8a7a5a;
    --highlight-active: #4d5158;
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.5);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.6);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: var(--font-sans);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    transition: background-color var(--transition), color var(--transition);
  }

  body {
    background-color: var(--bg-page);
    background-image: var(--bg-page-image);
    background-attachment: fixed;
    min-height: 100vh;
  }

  /* ===== Layout ===== */
  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: margin-left var(--transition), opacity var(--transition);
    backdrop-filter: blur(10px);
  }
  .sidebar.collapsed {
    margin-left: -260px;
    opacity: 0;
  }

  .brand {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .brand-tag {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  .sidebar-header {
    padding: 18px 18px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  .sidebar-list::-webkit-scrollbar { width: 6px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .song-item {
    padding: 12px 14px;
    border-radius: var(--radius-md);
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    transition: background var(--transition), border-color var(--transition);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .song-item:hover { background: var(--bg-surface-2); }
  .song-item.active {
    background: var(--bg-elevated);
    border-color: var(--border-strong);
    box-shadow: var(--shadow-sm);
  }
  .song-item-info { flex: 1; min-width: 0; }
  .song-item-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .song-item-artist {
    font-size: 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }
  .song-item-delete {
    background: transparent;
    border: none;
    color: var(--text-tertiary);
    font-size: 18px;
    cursor: pointer;
    padding: 0 6px;
    line-height: 1;
    opacity: 0;
    transition: opacity var(--transition), color var(--transition);
  }
  .song-item:hover .song-item-delete { opacity: 1; }
  .song-item-delete:hover { color: var(--text-primary); }

  /* Main */
  .main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    backdrop-filter: blur(10px);
    flex-wrap: wrap;
    gap: 10px;
  }

  .topbar-left, .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    padding: 0;
    font-size: 14px;
  }
  .icon-btn:hover {
    background: var(--bg-surface-2);
    color: var(--text-primary);
    border-color: var(--border-strong);
  }
  .icon-btn svg { width: 16px; height: 16px; }

  .btn {
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all var(--transition);
  }
  .btn:hover {
    background: var(--bg-surface-2);
    border-color: var(--border-strong);
  }
  .btn-primary {
    background: var(--text-primary);
    color: var(--bg-page);
    border-color: var(--text-primary);
  }
  .btn-primary:hover {
    opacity: 0.85;
    background: var(--text-primary);
  }

  /* Segmented control */
  .segmented {
    display: inline-flex;
    background: var(--bg-surface-2);
    border-radius: var(--radius-sm);
    padding: 3px;
    border: 1px solid var(--border);
  }
  .segmented button {
    padding: 5px 12px;
    font-size: 12px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--transition);
  }
  .segmented button.active {
    background: var(--bg-elevated);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }

  /* Content */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
  }
  .content::-webkit-scrollbar { width: 8px; }
  .content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  .doc-header {
    max-width: 1100px;
    margin: 0 auto 24px;
  }

  .title-input {
    width: 100%;
    font-size: 32px;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--text-primary);
    padding: 4px 0;
    font-family: inherit;
    outline: none;
    letter-spacing: -0.02em;
  }
  .title-input::placeholder { color: var(--text-tertiary); }

  .artist-input {
    width: 100%;
    font-size: 14px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    padding: 4px 0;
    margin-top: 4px;
    font-family: inherit;
    outline: none;
  }
  .artist-input::placeholder { color: var(--text-tertiary); }

  .doc-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0 24px;
  }

  /* Body layouts */
  .doc-body { max-width: 1100px; margin: 0 auto; position: relative; }
  .doc-body.split {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
    gap: 24px;
    align-items: flex-start;
  }

  .lyrics-area, .lyrics-display {
    width: 100%;
    min-height: 540px;
    padding: 28px 32px;
    font-family: var(--font-serif);
    line-height: 2.1;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
    box-sizing: border-box;
  }
  .lyrics-area {
    resize: both;
    overflow: auto;
    outline: none;
    font-family: var(--font-serif);
    max-width: 100%;
  }
  .lyrics-area:focus { border-color: var(--border-strong); }
  .lyrics-area::placeholder { color: var(--text-tertiary); }

  .lyrics-display {
    white-space: pre-wrap;
    word-break: break-word;
    resize: both;
    overflow: auto;
    max-width: 100%;
  }

  /* Font size control */
  .font-size-control {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px 8px;
  }
  .font-size-control button {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: inherit;
    line-height: 1;
    transition: all var(--transition);
  }
  .font-size-control button:hover {
    background: var(--bg-elevated);
    color: var(--text-primary);
  }
  .font-size-control .fs-value {
    font-size: 11px;
    color: var(--text-tertiary);
    min-width: 24px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* Drag and drop */
  .song-item {
    user-select: none;
  }
  .song-item.dragging {
    opacity: 0.4;
  }
  .song-item.drag-over-top {
    border-top: 2px solid var(--accent);
    margin-top: 2px;
  }
  .song-item.drag-over-bottom {
    border-bottom: 2px solid var(--accent);
    margin-bottom: 2px;
  }
  .drag-handle {
    color: var(--text-tertiary);
    cursor: grab;
    padding: 0 4px;
    font-size: 14px;
    line-height: 1;
    opacity: 0;
    transition: opacity var(--transition);
  }
  .song-item:hover .drag-handle { opacity: 0.6; }
  .drag-handle:hover { opacity: 1 !important; }
  .drag-handle:active { cursor: grabbing; }

  .hl {
    background: var(--highlight-bg);
    color: var(--highlight-text);
    padding: 2px 4px;
    border-radius: 4px;
    cursor: pointer;
    border-bottom: 2px solid var(--highlight-border);
    transition: background var(--transition);
  }
  .hl:hover { background: var(--highlight-active); }
  .hl.active { background: var(--highlight-active); }

  /* Panels */
  .split-panel {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
    min-height: 540px;
    box-shadow: var(--shadow-sm);
    box-sizing: border-box;
  }

  .floating-panel {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 320px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 20;
  }
  .floating-panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .panel-label {
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .panel-quote {
    font-family: var(--font-serif);
    font-size: 15px;
    color: var(--highlight-text);
    background: var(--highlight-bg);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 14px;
    border-left: 3px solid var(--highlight-border);
    line-height: 1.6;
  }
  .panel-note {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.75;
    white-space: pre-wrap;
    margin-bottom: 14px;
    max-height: 320px;
    overflow-y: auto;
  }
  .panel-textarea {
    width: 100%;
    min-height: 130px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    background: var(--bg-page);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    resize: vertical;
    outline: none;
    box-sizing: border-box;
    transition: border-color var(--transition);
  }
  .panel-textarea:focus { border-color: var(--border-strong); }
  .panel-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .panel-hint {
    font-size: 13px;
    color: var(--text-tertiary);
    margin: 0;
    line-height: 1.7;
  }

  /* Theme picker */
  .theme-picker {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .theme-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: transform var(--transition), border-color var(--transition);
    padding: 0;
  }
  .theme-swatch:hover { transform: scale(1.1); }
  .theme-swatch.active {
    border-color: var(--text-primary);
    transform: scale(1.1);
  }

  /* Empty state */
  .empty-state {
    max-width: 480px;
    margin: 80px auto;
    text-align: center;
    padding: 60px 30px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .empty-state h3 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 8px;
    color: var(--text-primary);
  }
  .empty-state p {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 0 0 24px;
    line-height: 1.7;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 480px;
    width: 90%;
    box-shadow: var(--shadow-lg);
  }
  .modal h3 {
    margin: 0 0 16px;
    font-size: 17px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .modal p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin: 0 0 20px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .content { padding: 24px 20px; }
    .sidebar { width: 240px; }
    .doc-body.split {
      grid-template-columns: 1fr;
    }
    .title-input { font-size: 26px; }
  }
  @media (max-width: 640px) {
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 50;
      box-shadow: var(--shadow-lg);
    }
    .topbar { padding: 12px 16px; }
  }
</style>
</head>
<body class="light">

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-name">まとみる</div>
      <div class="brand-tag">まとめてみる、歌詞ノート</div>
    </div>
    <div class="sidebar-header">
      <div class="sidebar-title">マイ ソングス</div>
      <button class="icon-btn" id="new-song-btn" title="新しい曲">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" id="sidebar-toggle" title="サイドバー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="theme-picker" id="theme-picker"></div>
      </div>
      <div class="topbar-right" id="topbar-right"></div>
    </div>

    <div class="content" id="content"></div>
  </main>
</div>

<!-- Confirm modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h3 id="modal-title">確認</h3>
    <p id="modal-msg">本当に削除する?</p>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">キャンセル</button>
      <button class="btn btn-primary" id="modal-ok">削除する</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ===== State =====
  const STORAGE_KEY = 'matomiru_v1';
  const THEME_KEY = 'matomiru_theme';

  const themes = [
    { id: 'light', name: '木材 (ライト)', color: '#d9b88a' },
    { id: 'dark', name: '鉄 (ダーク)', color: '#3a3d41' }
  ];

  let state = {
    songs: [],
    currentId: null,
    sidebarOpen: true,
    editMode: true,
    layoutMode: 'focus',
    activeAnnotationId: null,
    panelOpen: false,
    selectedText: '',
    draftNote: '',
    fontSize: 17
  };

  let dragSongId = null;

  let globalTheme = 'light';

  // ===== Storage =====
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        songs: state.songs,
        currentId: state.currentId,
        fontSize: state.fontSize
      }));
    } catch (e) { console.error('Save failed', e); }
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        state.songs = data.songs || [];
        state.currentId = data.currentId;
        if (typeof data.fontSize === 'number') state.fontSize = data.fontSize;
        if (state.currentId && !state.songs.find(s => s.id === state.currentId)) {
          state.currentId = state.songs[0] ? state.songs[0].id : null;
        }
      }
      const t = localStorage.getItem(THEME_KEY);
      if (t === 'light' || t === 'dark') globalTheme = t;
    } catch (e) { console.error('Load failed', e); }
  }

  function saveTheme() {
    try { localStorage.setItem(THEME_KEY, globalTheme); } catch (e) {}
  }

  // ===== Helpers =====
  function uid() { return 's_' + Date.now() + '_' + Math.floor(Math.random()*999); }
  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function getCurrent() { return state.songs.find(s => s.id === state.currentId); }

  function applyTheme() {
    document.body.className = globalTheme;
  }

  // ===== Modal =====
  let modalCallback = null;
  function openModal(title, msg, onConfirm) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-msg').textContent = msg;
    modalCallback = onConfirm;
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    modalCallback = null;
  }
  document.getElementById('modal-cancel').onclick = closeModal;
  document.getElementById('modal-ok').onclick = () => {
    if (modalCallback) modalCallback();
    closeModal();
  };
  document.getElementById('modal').onclick = (e) => {
    if (e.target.id === 'modal') closeModal();
  };

  // ===== Actions =====
  function newSong() {
    const s = {
      id: uid(),
      title: '無題',
      artist: '',
      lyrics: '',
      annotations: [],
      createdAt: Date.now()
    };
    state.songs.unshift(s);
    state.currentId = s.id;
    state.activeAnnotationId = null;
    state.panelOpen = false;
    state.selectedText = '';
    state.editMode = true;
    save();
    render();
    setTimeout(() => {
      const t = document.querySelector('.title-input');
      if (t) { t.focus(); t.select(); }
    }, 50);
  }

  function deleteSong(id) {
    openModal('曲を削除', 'この曲と考察を削除する?元には戻せないよ。', () => {
      state.songs = state.songs.filter(s => s.id !== id);
      if (state.currentId === id) {
        state.currentId = state.songs[0] ? state.songs[0].id : null;
      }
      save();
      render();
    });
  }

  function updateField(field, val) {
    const s = getCurrent();
    if (!s) return;
    s[field] = val;
    save();
    if (field === 'title') renderSidebar();
  }

  function addAnnotation(text, note) {
    const s = getCurrent();
    if (!s) return;
    s.annotations.push({ id: uid(), text, note, createdAt: Date.now() });
    state.selectedText = '';
    state.draftNote = '';
    state.panelOpen = false;
    save();
    renderPanels();
    if (!state.editMode) renderHighlightedLyrics();
  }

  function deleteAnnotation(aid) {
    const s = getCurrent();
    if (!s) return;
    s.annotations = s.annotations.filter(a => a.id !== aid);
    if (state.activeAnnotationId === aid) {
      state.activeAnnotationId = null;
      state.panelOpen = false;
    }
    save();
    renderPanels();
    if (!state.editMode) renderHighlightedLyrics();
  }

  function handleSelection() {
    const ta = document.querySelector('.lyrics-area');
    if (!ta) return;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    if (start !== end) {
      const newSel = ta.value.substring(start, end).trim();
      if (newSel && newSel !== state.selectedText) {
        state.selectedText = newSel;
        state.draftNote = '';
        state.panelOpen = true;
        renderPanels();
      }
    }
  }

  function closePanel() {
    state.panelOpen = false;
    state.selectedText = '';
    state.activeAnnotationId = null;
    state.draftNote = '';
    renderPanels();
    if (!state.editMode) renderHighlightedLyrics();
  }

  function toggleSidebar() {
    state.sidebarOpen = !state.sidebarOpen;
    document.getElementById('sidebar').classList.toggle('collapsed', !state.sidebarOpen);
  }

  function setEditMode(edit) {
    state.editMode = edit;
    state.activeAnnotationId = null;
    state.panelOpen = false;
    state.selectedText = '';
    render();
  }

  function setLayout(layout) {
    state.layoutMode = layout;
    state.activeAnnotationId = null;
    state.panelOpen = false;
    render();
  }

  function setTheme(t) {
    globalTheme = t;
    saveTheme();
    applyTheme();
    renderThemePicker();
  }

  function changeFontSize(delta) {
    const next = state.fontSize + delta;
    if (next < 12 || next > 32) return;
    state.fontSize = next;
    save();
    // Update existing lyrics elements without full re-render
    document.querySelectorAll('.lyrics-area, .lyrics-display').forEach(el => {
      el.style.fontSize = state.fontSize + 'px';
    });
    const fsVal = document.querySelector('.font-size-control .fs-value');
    if (fsVal) fsVal.textContent = state.fontSize + 'px';
  }

  // ===== Renderers =====
  function renderThemePicker() {
    const c = document.getElementById('theme-picker');
    c.innerHTML = '';
    themes.forEach(t => {
      const b = document.createElement('button');
      b.className = 'theme-swatch' + (globalTheme === t.id ? ' active' : '');
      b.style.background = t.color;
      b.title = t.name;
      b.onclick = () => setTheme(t.id);
      c.appendChild(b);
    });
  }

  function renderSidebar() {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    if (state.songs.length === 0) {
      list.innerHTML = '<p style="font-size:13px;color:var(--text-tertiary);padding:14px;text-align:center;line-height:1.7;">まだ曲がないよ。<br>+ ボタンから始めよう。</p>';
      return;
    }
    state.songs.forEach(s => {
      const item = document.createElement('div');
      item.className = 'song-item' + (s.id === state.currentId ? ' active' : '');
      item.draggable = true;
      item.dataset.id = s.id;

      const handle = document.createElement('div');
      handle.className = 'drag-handle';
      handle.innerHTML = '⋮⋮';
      handle.title = 'ドラッグして並び替え';
      item.appendChild(handle);

      const info = document.createElement('div');
      info.className = 'song-item-info';
      const title = document.createElement('div');
      title.className = 'song-item-title';
      title.textContent = s.title || '無題';
      info.appendChild(title);
      if (s.artist) {
        const artist = document.createElement('div');
        artist.className = 'song-item-artist';
        artist.textContent = s.artist;
        info.appendChild(artist);
      }
      info.onclick = () => {
        state.currentId = s.id;
        state.activeAnnotationId = null;
        state.panelOpen = false;
        state.selectedText = '';
        state.editMode = true;
        save();
        render();
      };
      const del = document.createElement('button');
      del.className = 'song-item-delete';
      del.innerHTML = '×';
      del.onclick = (e) => { e.stopPropagation(); deleteSong(s.id); };

      // Drag and drop
      item.addEventListener('dragstart', (e) => {
        dragSongId = s.id;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        document.querySelectorAll('.song-item').forEach(el => {
          el.classList.remove('drag-over-top', 'drag-over-bottom');
        });
        dragSongId = null;
      });
      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!dragSongId || dragSongId === s.id) return;
        const rect = item.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        item.classList.remove('drag-over-top', 'drag-over-bottom');
        if (e.clientY < midY) {
          item.classList.add('drag-over-top');
        } else {
          item.classList.add('drag-over-bottom');
        }
      });
      item.addEventListener('dragleave', () => {
        item.classList.remove('drag-over-top', 'drag-over-bottom');
      });
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!dragSongId || dragSongId === s.id) return;
        const rect = item.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        const before = e.clientY < midY;
        reorderSongs(dragSongId, s.id, before);
      });

      item.appendChild(info);
      item.appendChild(del);
      list.appendChild(item);
    });
  }

  function reorderSongs(draggedId, targetId, before) {
    const draggedIdx = state.songs.findIndex(s => s.id === draggedId);
    if (draggedIdx === -1) return;
    const dragged = state.songs.splice(draggedIdx, 1)[0];
    let targetIdx = state.songs.findIndex(s => s.id === targetId);
    if (targetIdx === -1) {
      state.songs.push(dragged);
    } else {
      state.songs.splice(before ? targetIdx : targetIdx + 1, 0, dragged);
    }
    save();
    renderSidebar();
  }

  function renderHighlightedLyrics() {
    const container = document.querySelector('.lyrics-display');
    if (!container) return;
    const s = getCurrent();
    if (!s) return;

    let text = s.lyrics;
    const matches = [];
    s.annotations.forEach(a => {
      if (!a.text) return;
      let idx = 0;
      while ((idx = text.indexOf(a.text, idx)) !== -1) {
        matches.push({ start: idx, end: idx + a.text.length, id: a.id });
        idx += a.text.length;
      }
    });
    matches.sort((a, b) => a.start - b.start);
    const clean = [];
    let lastEnd = -1;
    matches.forEach(m => {
      if (m.start >= lastEnd) {
        clean.push(m);
        lastEnd = m.end;
      }
    });

    let html = '';
    let cursor = 0;
    clean.forEach(m => {
      html += escapeHtml(text.substring(cursor, m.start));
      const isActive = m.id === state.activeAnnotationId;
      html += '<span class="hl' + (isActive ? ' active' : '') + '" data-id="' + m.id + '">' + escapeHtml(text.substring(m.start, m.end)) + '</span>';
      cursor = m.end;
    });
    html += escapeHtml(text.substring(cursor));

    container.innerHTML = html || '<span style="color:var(--text-tertiary);">歌詞がまだ書かれてないよ</span>';

    container.querySelectorAll('.hl').forEach(el => {
      el.onclick = () => {
        state.activeAnnotationId = el.getAttribute('data-id');
        state.panelOpen = true;
        renderHighlightedLyrics();
        renderPanels();
      };
    });
  }

  function buildPanelContent(container, withClose) {
    const s = getCurrent();
    if (!s) return;
    container.innerHTML = '';

    const header = document.createElement('div');
    header.className = 'panel-header';
    const label = document.createElement('div');
    label.className = 'panel-label';
    header.appendChild(label);
    if (withClose) {
      const closeBtn = document.createElement('button');
      closeBtn.className = 'icon-btn';
      closeBtn.style.cssText = 'width:26px;height:26px;font-size:16px;';
      closeBtn.innerHTML = '×';
      closeBtn.onclick = closePanel;
      header.appendChild(closeBtn);
    }
    container.appendChild(header);

    // View existing annotation
    if (state.activeAnnotationId && !state.editMode) {
      const a = s.annotations.find(x => x.id === state.activeAnnotationId);
      if (a) {
        label.textContent = '考察';
        const quote = document.createElement('div');
        quote.className = 'panel-quote';
        quote.textContent = '「' + a.text + '」';
        container.appendChild(quote);

        const note = document.createElement('div');
        note.className = 'panel-note';
        note.textContent = a.note;
        container.appendChild(note);

        const actions = document.createElement('div');
        actions.className = 'panel-actions';
        const delBtn = document.createElement('button');
        delBtn.className = 'btn';
        delBtn.textContent = '削除';
        delBtn.onclick = () => deleteAnnotation(a.id);
        actions.appendChild(delBtn);
        container.appendChild(actions);
        return;
      }
    }

    // Edit mode with selection
    if (state.editMode && state.selectedText) {
      label.textContent = '考察を書く';
      const quote = document.createElement('div');
      quote.className = 'panel-quote';
      quote.textContent = '「' + state.selectedText + '」';
      container.appendChild(quote);

      const ta = document.createElement('textarea');
      ta.className = 'panel-textarea';
      ta.placeholder = 'この一節について考えたこと、感じたこと、解釈を書こう...';
      ta.value = state.draftNote;
      ta.oninput = (e) => { state.draftNote = e.target.value; };
      container.appendChild(ta);

      const actions = document.createElement('div');
      actions.className = 'panel-actions';
      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn btn-primary';
      saveBtn.textContent = '保存';
      saveBtn.onclick = () => {
        const note = ta.value.trim();
        if (!note) { ta.focus(); return; }
        addAnnotation(state.selectedText, note);
      };
      actions.appendChild(saveBtn);
      container.appendChild(actions);
      setTimeout(() => { if (!state.draftNote) ta.focus(); }, 50);
      return;
    }

    // Empty state
    label.textContent = state.editMode ? '考察を書く' : '考察';
    const hint = document.createElement('p');
    hint.className = 'panel-hint';
    if (state.editMode) {
      hint.textContent = '左の歌詞をドラッグして選択すると、その一節への考察を書き留められるよ。';
    } else {
      const hasAnn = s.annotations.length > 0;
      hint.textContent = hasAnn ? 'ハイライトされた一節をクリックすると、書き留めた考察が表示されるよ。' : 'まだ考察がないよ。編集モードに切り替えて、歌詞を選択してみよう。';
    }
    container.appendChild(hint);
  }

  function renderPanels() {
    const floating = document.querySelector('.floating-panel');
    const split = document.querySelector('.split-panel');
    if (floating) {
      floating.classList.toggle('open', state.panelOpen);
      if (state.panelOpen) buildPanelContent(floating, true);
    }
    if (split) {
      buildPanelContent(split, false);
    }
  }

  function renderTopbarRight() {
    const c = document.getElementById('topbar-right');
    c.innerHTML = '';
    const s = getCurrent();
    if (!s) {
      const newBtn = document.createElement('button');
      newBtn.className = 'btn btn-primary';
      newBtn.textContent = '+ 新しい曲';
      newBtn.onclick = newSong;
      c.appendChild(newBtn);
      return;
    }

    const modeSeg = document.createElement('div');
    modeSeg.className = 'segmented';
    [['edit','編集'],['read','読む']].forEach(([k, lbl]) => {
      const b = document.createElement('button');
      b.textContent = lbl;
      if ((k === 'edit') === state.editMode) b.classList.add('active');
      b.onclick = () => setEditMode(k === 'edit');
      modeSeg.appendChild(b);
    });
    c.appendChild(modeSeg);

    const layoutSeg = document.createElement('div');
    layoutSeg.className = 'segmented';
    [['focus','集中'],['split','半々']].forEach(([k, lbl]) => {
      const b = document.createElement('button');
      b.textContent = lbl;
      if (state.layoutMode === k) b.classList.add('active');
      b.onclick = () => setLayout(k);
      layoutSeg.appendChild(b);
    });
    c.appendChild(layoutSeg);

    // Font size control
    const fsCtrl = document.createElement('div');
    fsCtrl.className = 'font-size-control';
    const fsDown = document.createElement('button');
    fsDown.textContent = 'A−';
    fsDown.title = '文字を小さく';
    fsDown.onclick = () => changeFontSize(-1);
    const fsVal = document.createElement('span');
    fsVal.className = 'fs-value';
    fsVal.textContent = state.fontSize + 'px';
    const fsUp = document.createElement('button');
    fsUp.textContent = 'A+';
    fsUp.title = '文字を大きく';
    fsUp.onclick = () => changeFontSize(1);
    fsCtrl.appendChild(fsDown);
    fsCtrl.appendChild(fsVal);
    fsCtrl.appendChild(fsUp);
    c.appendChild(fsCtrl);

    const newBtn = document.createElement('button');
    newBtn.className = 'btn btn-primary';
    newBtn.textContent = '+ 新しい曲';
    newBtn.onclick = newSong;
    c.appendChild(newBtn);
  }

  function render() {
    const s = getCurrent();
    const content = document.getElementById('content');
    content.innerHTML = '';

    renderTopbarRight();
    renderSidebar();

    if (!s) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<h3>まとみるへようこそ</h3><p>歌詞を書き留めて、気になる一節に考察を残せるノート。<br>「まとめてみる」から、まとみる。</p>';
      const btn = document.createElement('button');
      btn.className = 'btn btn-primary';
      btn.textContent = '+ 最初の曲を作る';
      btn.onclick = newSong;
      empty.appendChild(btn);
      content.appendChild(empty);
      return;
    }

    // Doc header
    const docHeader = document.createElement('div');
    docHeader.className = 'doc-header';

    const titleIn = document.createElement('input');
    titleIn.className = 'title-input';
    titleIn.type = 'text';
    titleIn.value = s.title;
    titleIn.placeholder = 'タイトル';
    titleIn.oninput = (e) => updateField('title', e.target.value);
    docHeader.appendChild(titleIn);

    const artistIn = document.createElement('input');
    artistIn.className = 'artist-input';
    artistIn.type = 'text';
    artistIn.value = s.artist;
    artistIn.placeholder = 'アーティスト (自作なら空欄でもOK)';
    artistIn.oninput = (e) => updateField('artist', e.target.value);
    docHeader.appendChild(artistIn);

    const divider = document.createElement('div');
    divider.className = 'doc-divider';
    docHeader.appendChild(divider);

    content.appendChild(docHeader);

    // Body
    const body = document.createElement('div');
    body.className = 'doc-body' + (state.layoutMode === 'split' ? ' split' : '');

    const lyricsCol = document.createElement('div');
    lyricsCol.style.minWidth = '0';

    if (state.editMode) {
      const ta = document.createElement('textarea');
      ta.className = 'lyrics-area';
      ta.value = s.lyrics;
      ta.style.fontSize = state.fontSize + 'px';
      ta.placeholder = 'ここに歌詞を書こう。\n\n気になる一節をドラッグして選択すると、考察を書き留められるよ。';
      ta.oninput = (e) => updateField('lyrics', e.target.value);
      ta.onmouseup = handleSelection;
      ta.onkeyup = handleSelection;
      lyricsCol.appendChild(ta);
    } else {
      const display = document.createElement('div');
      display.className = 'lyrics-display';
      display.style.fontSize = state.fontSize + 'px';
      lyricsCol.appendChild(display);
    }
    body.appendChild(lyricsCol);

    if (state.layoutMode === 'split') {
      const splitPanel = document.createElement('div');
      splitPanel.className = 'split-panel';
      body.appendChild(splitPanel);
    } else {
      const floating = document.createElement('div');
      floating.className = 'floating-panel';
      body.appendChild(floating);
    }

    content.appendChild(body);

    if (!state.editMode) renderHighlightedLyrics();
    renderPanels();
  }

  // ===== Init =====
  document.getElementById('sidebar-toggle').onclick = toggleSidebar;
  document.getElementById('new-song-btn').onclick = newSong;

  load();
  applyTheme();
  renderThemePicker();
  render();

  // Save before unload (just in case)
  window.addEventListener('beforeunload', save);
})();
</script>
</body>
</html>
